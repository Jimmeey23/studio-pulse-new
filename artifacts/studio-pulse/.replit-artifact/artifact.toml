kind = "web"
previewPath = "/"
title = "Studio Pulse"
version = "1.0.0"
id = "artifacts/studio-pulse"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18673

[services.development]
run = "pnpm --filter @workspace/studio-pulse run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/studio-pulse", "run", "build" ]
publicDir = "artifacts/studio-pulse/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18673"
BASE_PATH = "/"
